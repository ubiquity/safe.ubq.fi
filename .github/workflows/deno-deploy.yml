name: Deploy (Deno Deploy)

on:
  push:
    branches: [development]
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    secrets: inherit
    with:
      project: safe-ubq-fi
      preview_project: safe-ubq-fi-preview
      entrypoint: serve.ts
      install_command: |
        yarn install --frozen-lockfile
      build_command: |
        yarn build
      node_version: "20.10.0"
      deno_version: 2.x
      deployctl_version: "1.12.0"
      prod_branch: development
      include: |
        static/**
      exclude: |
        node_modules
        tests
        cypress
